<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Agent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', path='favicon.ico') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>
    <div class="container">
        <aside class="sidebar">
            <div>
                <div class="logo">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
                    </svg>
                    Web Agent
                </div>

                <div class="nav-item" onclick="window.location.href='/'"
                    style="background: rgba(255,255,255,0.1); margin-bottom: 20px; cursor: pointer;">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    New Chat
                </div>

                <ul class="nav-links">
                    <li class="nav-item active">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
                        </svg>
                        Current Chat
                    </li>
                </ul>
            </div>

            <div class="session-container">
                <div class="session-label">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                    Session ID:
                </div>
                <div id="session-display" class="session-id-box" title="Click to copy" onclick="copySessionId()">{{
                    session_id }}</div>

                <div class="session-input-group">
                    <input type="text" id="load-session-input" class="session-input" placeholder="Enter Session ID">
                    <button onclick="loadSession()" class="session-load-btn">Load Session</button>
                </div>
            </div>
        </aside>

        <main class="chat-area">
            <div class="chat-header">
                <h2>Web Search Agent</h2>
                <div style="font-size: 0.8rem; color: #888;">Connected to Azure OpenAI</div>
            </div>

            <div class="chat-messages" id="chat-box">
                <div class="message agent">
                    Hello! I am your Web Search Agent. How can I help you today?
                </div>
            </div>

            <div class="typing-indicator" id="typing-indicator">
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            </div>

            <div class="input-area">
                <div class="input-container">
                    <input type="text" id="user-input" placeholder="Ask anything..." autocomplete="off">
                    <button id="send-btn" onclick="sendMessage()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13" />
                            <polygon points="22 2 15 22 11 13 2 9 22 2" />
                        </svg>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const typingIndicator = document.getElementById('typing-indicator');

        let sessionId = "{{ session_id }}";

        userInput.focus();

        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            addMessage(message, 'user');
            userInput.value = '';

            showTyping(true);

            try {
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ message: message, session_id: sessionId })
                });

                const data = await response.json();

                showTyping(false);

                addMessage(data.response, 'ai');
            } catch (error) {
                console.error('Error:', error);
                showTyping(false);
                addMessage('Sorry, something went wrong. Please try again.', 'ai');
            }
        }

        function copySessionId() {
            navigator.clipboard.writeText(sessionId).then(() => {
                alert('Session ID copied to clipboard!');
            }).catch(err => {
                console.error('Failed to copy text: ', err);
            });
        }

        async function loadSession() {
            const input = document.getElementById('load-session-input');
            const newSid = input.value.trim();
            if (!newSid) return;

            sessionId = newSid;
            document.getElementById('session-display').textContent = sessionId;
            input.value = '';

            chatBox.innerHTML = '';

            const loadingMsg = document.createElement('div');
            loadingMsg.className = 'message agent';
            loadingMsg.textContent = `Loading session ${sessionId}...`;
            chatBox.appendChild(loadingMsg);

            try {
                const response = await fetch('/history', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: "history", session_id: sessionId })
                });

                const data = await response.json();

                chatBox.innerHTML = '';

                if (data.history && Array.isArray(data.history) && data.history.length > 0) { // web_agent history format: {role: 'user'|'assistant', content: '...'}
                    data.history.forEach(msg => {
                        const sender = msg.role === 'user' ? 'user' : 'ai';
                        addMessage(msg.content, sender);
                    });

                    const marker = document.createElement('div');
                    marker.style.textAlign = 'center';
                    marker.style.color = '#888';
                    marker.style.fontSize = '0.8rem';
                    marker.style.margin = '10px 0';
                    marker.textContent = '--- History Loaded ---';
                    chatBox.appendChild(marker);
                } else {
                    addMessage("No history found for this session.", 'agent');
                }
            } catch (error) {
                console.error("Error loading history:", error);
                chatBox.innerHTML = '';
                addMessage("Failed to load history.", 'agent');
            }
        }

        function addMessage(text, sender) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;

            if (sender === 'agent' && typeof marked !== 'undefined') {
                messageDiv.innerHTML = marked.parse(text);
            } else {
                messageDiv.textContent = text;
            }

            if (typingIndicator && typingIndicator.parentNode === chatBox) {
                chatBox.insertBefore(messageDiv, typingIndicator);
            } else {
                chatBox.appendChild(messageDiv);
            }
            scrollToBottom();
        }

        function showTyping(show) {
            if (show) {
                chatBox.appendChild(typingIndicator);
                typingIndicator.style.display = 'flex';
            } else {
                typingIndicator.style.display = 'none';
            }
            scrollToBottom();
        }

        function scrollToBottom() {
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>

</html>
